name: Keep Supabase Active

on:
  schedule:
    - cron: '0 0 */2 * *'  # every 2 days at midnight UTC
  workflow_dispatch:         # allow manual trigger from Actions tab

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase REST API (with retries)
        run: |
          set -euo pipefail
          url="${{ secrets.SUPABASE_URL }}/rest/v1/"
          echo "Pinging: $url"

          for i in {1..12}; do
            status=$(curl -s -o /dev/null -w "%{http_code}" \
              --connect-timeout 10 --max-time 20 \
              "$url" \
              -H "apikey: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
              -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}") || status=000

            echo "Attempt $i: HTTP $status"

            # 2xx — clean success
            if [ "$status" -ge 200 ] && [ "$status" -lt 300 ]; then
              echo "Supabase is alive"
              exit 0
            fi

            # 401/403 — endpoint is reachable, goal of keeping the DB warm is met
            if [ "$status" = "401" ] || [ "$status" = "403" ]; then
              echo "Endpoint reachable (HTTP $status) — DB is awake"
              exit 0
            fi

            # 5xx / 000 — transient, wait and retry
            echo "Transient error, retrying in 10s…"
            sleep 10
          done

          echo "Ping failed after 12 attempts (last status: $status)"
          exit 1
