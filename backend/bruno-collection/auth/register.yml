info:
  name: register
  type: http
  seq: 1

http:
  method: POST
  url: http://localhost:3000/api/v1/auth/register
  body:
    type: json
    data: |-
      {
        "email": "dan@example.com",
        "password": "dan12345",
        "name": "dan"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
